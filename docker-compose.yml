services:
  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - annotation-net

  gateway:
    build:
      context: ./services
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SEGMENTATION_SERVICE_URL=http://segmentation:8002
    volumes:
      - datasets:/app/datasets
      - jobs_db:/app/db
    depends_on:
      segmentation:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - annotation-net

  segmentation:
    build:
      context: ./services
      dockerfile: segmentation/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - SAM3_MODEL_ID=${SAM3_MODEL_ID:-facebook/sam3}
      - SAM3_FP32=${SAM3_FP32:-false}
      - SAM3_LAZY_LOAD=${SAM3_LAZY_LOAD:-true}
      - LABELING_COOLDOWN_MS=${LABELING_COOLDOWN_MS:-200}
      # Cooldown between class inferences within a single image (prevents GPU overheating).
      # Increase if GPU fans saturate or PC shuts down. Set to 0 to disable.
      - INTER_CLASS_COOLDOWN_MS=${INTER_CLASS_COOLDOWN_MS:-300}
    # GPU thermal management: sudo nvidia-smi -pl 150 (adjust watts for your GPU)
    volumes:
      - checkpoints:/app/checkpoints
      - datasets:/app/datasets
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - annotation-net

networks:
  annotation-net:
    driver: bridge

volumes:
  datasets:
  jobs_db:
  checkpoints:
  hf_cache:
